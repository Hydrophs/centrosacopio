document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lay: swap;\n  src: url(\"71b60290-f618-4aa8-95c6-e3bb4e9210de\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"7b41c83f-6711-4da6-a11f-b6ad4f6b5c61\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"b4e2e90c-218b-4c7f-ba8e-fe5749dbb46f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a3b5c470-bf1e-4c88-ae07-f73e41a43512\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   S-RANK ARENA · Colors — \"Challenger\" (electric blue)\n   Dark is the primary theme (:root). Light overrides under\n   [data-theme=\"light\"]. Base palette is theme-independent;\n   semantic aliases flip per theme.\n   ============================================================ */\n\n:root {\n  /* ---- Brand: electric blue scale ---- */\n  --blue-50:  #EDF2FF;\n  --blue-100: #DBE4FF;\n  --blue-200: #B7C8FF;\n  --blue-300: #8EA8FF;\n  --blue-400: #6486FF;\n  --blue-500: #3E6BFF;   /* hero / primary */\n  --blue-600: #2F58E6;\n  --blue-700: #2545BC;\n  --blue-800: #1F3992;\n  --blue-900: #182C6E;\n\n  /* ---- Secondary: cyan ---- */\n  --cyan-300: #7BE3FF;\n  --cyan-400: #54D9FF;\n  --cyan-500: #36D2FF;\n  --cyan-600: #12B4E8;\n  --cyan-700: #0E90BD;\n\n  /* ---- Neutral (cool, blue-tinted) ---- */\n  --ink-25:  #F7F9FD;\n  --ink-50:  #EEF2F9;\n  --ink-100: #E3E8F1;\n  --ink-200: #CCD5E4;\n  --ink-300: #A8B2C6;\n  --ink-400: #828DA4;\n  --ink-500: #5C6577;\n  --ink-600: #353E54;\n  --ink-700: #232B3E;\n  --ink-800: #161C2B;\n  --ink-900: #0E1322;\n  --ink-950: #0A0E1A;\n\n  /* ---- Semantic palette (raw) ---- */\n  --green-400: #4ADE80;\n  --green-500: #22C55E;\n  --green-600: #16A34A;\n  --red-400:   #FF6470;\n  --red-500:   #F0434F;\n  --red-600:   #DC2A37;\n  --amber-400: #FBBF24;\n  --amber-500: #F5A524;\n  --amber-600: #D9870B;\n\n  /* ---- Rank ladder (F → S) ---- */\n  --rank-f: #828DA4;\n  --rank-e: #34D399;\n  --rank-d: #38BDF8;\n  --rank-c: #818CF8;\n  --rank-b: #FBBF24;\n  --rank-a: #FB7185;\n  --rank-s: #36D2FF;\n\n  /* ---- Achievement tiers ---- */\n  --tier-bronze:   #CD7F32;\n  --tier-silver:   #B8C0CC;\n  --tier-gold:     #F5B921;\n  --tier-platinum: #36D2FF;\n  --tier-srank:    #3E6BFF;\n\n  /* ===== DARK THEME (default) ===== */\n  color-scheme: dark;\n\n  --bg:           #0A0E1A;\n  --bg-subtle:    #0E1322;\n  --surface:      #121826;\n  --surface-2:    #1A2235;\n  --surface-3:    #222C42;\n  --surface-inset:#0C111E;\n\n  --border:        #232B3E;\n  --border-strong: #333E57;\n  --border-faint:  #1A2030;\n\n  --text:           #EAEEF7;\n  --text-secondary: #939BB0;\n  --text-muted:     #5C6577;\n  --text-onaccent:  #FFFFFF;\n\n  --accent:         var(--blue-500);\n  --accent-hover:   var(--blue-400);\n  --accent-press:   var(--blue-600);\n  /* soft/ring/glow derive from --accent so swapping the accent theme cascades */\n  --accent-soft:    color-mix(in srgb, var(--accent) 14%, transparent);\n  --accent-softer:  color-mix(in srgb, var(--accent) 8%, transparent);\n  --accent-ring:    color-mix(in srgb, var(--accent) 45%, transparent);\n  --accent-2:       var(--cyan-500);\n  --accent-2-soft:  color-mix(in srgb, var(--accent-2) 14%, transparent);\n\n  --success: var(--green-500);  --success-soft: rgba(34, 197, 94, 0.15);\n  --danger:  var(--red-500);    --danger-soft:  rgba(240, 67, 79, 0.15);\n  --warning: var(--amber-500);  --warning-soft: rgba(245, 165, 36, 0.15);\n  --info:    var(--blue-400);   --info-soft:    rgba(100, 134, 255, 0.15);\n\n  --overlay: rgba(5, 8, 16, 0.66);\n\n  /* Elevation (theme-dependent) */\n  --shadow-sm:   0 1px 2px rgba(0,0,0,0.40);\n  --shadow-md:   0 4px 14px rgba(0,0,0,0.45);\n  --shadow-lg:   0 12px 34px rgba(0,0,0,0.55);\n  --shadow-glow: 0 0 0 1px color-mix(in srgb, var(--accent) 35%, transparent), 0 6px 26px color-mix(in srgb, var(--accent) 30%, transparent);\n  --shadow-glow-cyan: 0 0 0 1px color-mix(in srgb, var(--accent-2) 35%, transparent), 0 6px 26px color-mix(in srgb, var(--accent-2) 28%, transparent);\n}\n\n/* ===== LIGHT THEME ===== */\n[data-theme=\"light\"] {\n  color-scheme: light;\n\n  --bg:           #F3F6FC;\n  --bg-subtle:    #E9EFF8;\n  --surface:      #FFFFFF;\n  --surface-2:    #F3F6FC;\n  --surface-3:    #E9EFF8;\n  --surface-inset:#EEF2F9;\n\n  --border:        #E3E8F1;\n  --border-strong: #CCD5E4;\n  --border-faint:  #EDF1F8;\n\n  --text:           #0D1320;\n  --text-secondary: #56607A;\n  --text-muted:     #8A93A7;\n  --text-onaccent:  #FFFFFF;\n\n  --accent:         #2F5BFF;\n  --accent-hover:   #2546DC;\n  --accent-press:   #1E3DB8;\n  --accent-soft:    color-mix(in srgb, var(--accent) 10%, transparent);\n  --accent-softer:  color-mix(in srgb, var(--accent) 5%, transparent);\n  --accent-ring:    color-mix(in srgb, var(--accent) 30%, transparent);\n  --accent-2:       #0FA9CE;\n  --accent-2-soft:  color-mix(in srgb, var(--accent-2) 12%, transparent);\n\n  --success: var(--green-600);  --success-soft: rgba(22, 163, 74, 0.10);\n  --danger:  var(--red-600);    --danger-soft:  rgba(220, 42, 55, 0.10);\n  --warning: var(--amber-600);  --warning-soft: rgba(217, 135, 11, 0.12);\n  --info:    #2F5BFF;           --info-soft:    rgba(47, 91, 255, 0.10);\n\n  --rank-f: #8A93A7;\n\n  --overlay: rgba(15, 23, 42, 0.38);\n\n  --shadow-sm:   0 1px 2px rgba(16,32,64,0.06);\n  --shadow-md:   0 6px 18px rgba(16,32,64,0.08);\n  --shadow-lg:   0 16px 40px rgba(16,32,64,0.12);\n  --shadow-glow: 0 0 0 1px color-mix(in srgb, var(--accent) 25%, transparent), 0 8px 26px color-mix(in srgb, var(--accent) 20%, transparent);\n  --shadow-glow-cyan: 0 0 0 1px color-mix(in srgb, var(--accent-2) 25%, transparent), 0 8px 26px color-mix(in srgb, var(--accent-2) 18%, transparent);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   S-RANK ARENA · Accent themes\n   Four selectable accent identities, each working in light & dark.\n   Set data-accent=\"challenger|volt|ember|aurora\" on <html> (or any\n   wrapper); combine with data-theme=\"light|dark\". The neutral\n   surfaces stay shared — only the accent (and everything derived\n   from it: soft, ring, glow, gradients) changes.\n   Default (no data-accent) = Challenger, defined in colors.css.\n   ============================================================ */\n\n/* ---- DARK accents (primary) ---- */\n[data-accent=\"challenger\"] {\n  --accent: #3E6BFF; --accent-hover: #6486FF; --accent-press: #2F58E6;\n  --accent-2: #36D2FF; --text-onaccent: #FFFFFF;\n}\n[data-accent=\"volt\"] {\n  --accent: #C6F24E; --accent-hover: #D4F86E; --accent-press: #AEDF2E;\n  --accent-2: #38E8FF; --text-onaccent: #0E120A;\n}\n[data-accent=\"ember\"] {\n  --accent: #FF6A3D; --accent-hover: #FF8159; --accent-press: #E85427;\n  --accent-2: #A78BFA; --text-onaccent: #2A1206;\n}\n[data-accent=\"aurora\"] {\n  --accent: #8B6CFF; --accent-hover: #A18BFF; --accent-press: #6D4DE0;\n  --accent-2: #34E5C0; --text-onaccent: #FFFFFF;\n}\n\n/* ---- LIGHT accents (deeper hues so the accent stays legible as\n        foreground on white surfaces) ---- */\n[data-theme=\"light\"][data-accent=\"challenger\"] {\n  --accent: #2F5BFF; --accent-hover: #2546DC; --accent-press: #1E3DB8;\n  --accent-2: #0FA9CE; --text-onaccent: #FFFFFF;\n}\n[data-theme=\"light\"][data-accent=\"volt\"] {\n  --accent: #4F7A00; --accent-hover: #5E8F00; --accent-press: #3F6300;\n  --accent-2: #0FB6D8; --text-onaccent: #FFFFFF;\n}\n[data-theme=\"light\"][data-accent=\"ember\"] {\n  --accent: #E8512A; --accent-hover: #FF6A3D; --accent-press: #C53F1C;\n  --accent-2: #7C5CF0; --text-onaccent: #FFFFFF;\n}\n[data-theme=\"light\"][data-accent=\"aurora\"] {\n  --accent: #6D4DE0; --accent-hover: #7C5CF0; --accent-press: #583BC0;\n  --accent-2: #0FB6A0; --text-onaccent: #FFFFFF;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   S-RANK ARENA · Typography tokens\n   Clean & neutral — Plus Jakarta Sans (UI/display) +\n   JetBrains Mono (stats, ranks, labels, tags). Personality\n   comes from color & shape, not aggressive casing.\n   ============================================================ */\n\n:root {\n  /* Families */\n  --font-sans: \"Plus Jakarta Sans\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n  /* Display & body share the sans family; weight + size carry hierarchy */\n  --font-display: var(--font-sans);\n  --font-body: var(--font-sans);\n\n  /* Weights */\n  --fw-regular: 400;   /* @kind font */\n  --fw-medium: 500;    /* @kind font */\n  --fw-semibold: 600;  /* @kind font */\n  --fw-bold: 700;      /* @kind font */\n  --fw-extrabold: 800; /* @kind font */\n\n  /* Type scale (rem, 16px base) */\n  --text-2xs: 0.6875rem;  /* 11px — mono micro-labels */\n  --text-xs:  0.75rem;    /* 12px */\n  --text-sm:  0.875rem;   /* 14px */\n  --text-base:1rem;       /* 16px */\n  --text-md:  1.125rem;   /* 18px */\n  --text-lg:  1.375rem;   /* 22px */\n  --text-xl:  1.75rem;    /* 28px */\n  --text-2xl: 2.25rem;    /* 36px */\n  --text-3xl: 3rem;       /* 48px */\n  --text-4xl: 4rem;       /* 64px — hero */\n\n  /* Line heights */\n  --leading-tight: 1.05;\n  --leading-snug: 1.2;\n  --leading-normal: 1.5;\n  --leading-relaxed: 1.65;\n\n  /* Letter spacing */\n  --tracking-display: -0.035em;  /* big headings */\n  --tracking-tight: -0.02em;\n  --tracking-normal: 0;\n  --tracking-label: 0.04em;      /* mono uppercase micro-labels */\n  --tracking-wide: 0.08em;\n}\n\n/* Optional helpers — components reference vars directly, but these\n   are handy in card/specimen markup. */\n.t-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-extrabold);\n  letter-spacing: var(--tracking-display);\n  line-height: var(--leading-tight);\n}\n.t-label {\n  font-family: var(--font-mono);\n  font-weight: var(--fw-medium);\n  font-size: var(--text-2xs);\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n}\n.t-stat {\n  font-family: var(--font-mono);\n  font-weight: var(--fw-bold);\n  font-variant-numeric: tabular-nums;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   S-RANK ARENA · Spacing, radii, motion (theme-independent)\n   4px base scale. Generous, friendly corner radii.\n   ============================================================ */\n\n:root {\n  /* Spacing scale (4px base) */\n  --space-0: 0;\n  --space-1: 0.25rem;   /* 4 */\n  --space-2: 0.5rem;    /* 8 */\n  --space-3: 0.75rem;   /* 12 */\n  --space-4: 1rem;      /* 16 */\n  --space-5: 1.25rem;   /* 20 */\n  --space-6: 1.5rem;    /* 24 */\n  --space-8: 2rem;      /* 32 */\n  --space-10: 2.5rem;   /* 40 */\n  --space-12: 3rem;     /* 48 */\n  --space-16: 4rem;     /* 64 */\n  --space-20: 5rem;     /* 80 */\n  --space-24: 6rem;     /* 96 */\n\n  /* Radii — rounded & friendly */\n  --radius-xs: 6px;\n  --radius-sm: 10px;\n  --radius-md: 12px;\n  --radius-lg: 16px;\n  --radius-xl: 20px;\n  --radius-2xl: 24px;\n  --radius-3xl: 32px;\n  --radius-pill: 999px;\n\n  /* Containers */\n  --container: 1200px;\n  --container-wide: 1320px;\n\n  /* Z layers */\n  --z-nav: 40;        /* @kind other */\n  --z-dropdown: 50;   /* @kind other */\n  --z-overlay: 90;    /* @kind other */\n  --z-modal: 100;     /* @kind other */\n  --z-toast: 120;     /* @kind other */\n\n  /* Motion — quick, friendly, slight overshoot on press */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);      /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --dur-fast: 120ms;  /* @kind other */\n  --dur: 200ms;       /* @kind other */\n  --dur-slow: 320ms;  /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   S-RANK ARENA · Base — element defaults built on the tokens.\n   Kept light so consumers can opt in. Sets the dark theme as\n   the default surface; add data-theme=\"light\" on <html>/<body>\n   (or any wrapper) to switch.\n   ============================================================ */\n\n* { box-sizing: border-box; }\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  text-rendering: optimizeLegibility;\n}\n\nbody {\n  margin: 0;\n  background-color: var(--bg);\n  color: var(--text);\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  font-weight: var(--fw-regular);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n::selection {\n  background: var(--accent-soft);\n  color: var(--text);\n}\n\na { color: inherit; text-decoration: none; }\n\n:focus-visible {\n  outline: 2px solid var(--accent);\n  outline-offset: 2px;\n  border-radius: var(--radius-xs);\n}\n\n/* Scrollbar */\n::-webkit-scrollbar { width: 10px; height: 10px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb {\n  background: var(--border-strong);\n  border-radius: var(--radius-pill);\n  border: 2px solid transparent;\n  background-clip: padding-box;\n}\n::-webkit-scrollbar-thumb:hover { background: var(--text-muted); background-clip: padding-box; }\n\n/* Tabular numerals everywhere stats appear */\n.tnum { font-variant-numeric: tabular-nums; }\n<\u002Fstyle>\n  <style>/* required styles */\r\n\r\n.leaflet-pane,\r\n.leaflet-tile,\r\n.leaflet-marker-icon,\r\n.leaflet-marker-shadow,\r\n.leaflet-tile-container,\r\n.leaflet-pane > svg,\r\n.leaflet-pane > canvas,\r\n.leaflet-zoom-box,\r\n.leaflet-image-layer,\r\n.leaflet-layer {\r\n\tposition: absolute;\r\n\tleft: 0;\r\n\ttop: 0;\r\n\t}\r\n.leaflet-container {\r\n\toverflow: hidden;\r\n\t}\r\n.leaflet-tile,\r\n.leaflet-marker-icon,\r\n.leaflet-marker-shadow {\r\n\t-webkit-user-select: none;\r\n\t   -moz-user-select: none;\r\n\t        user-select: none;\r\n\t  -webkit-user-drag: none;\r\n\t}\r\n/* Prevents IE11 from highlighting tiles in blue */\r\n.leaflet-tile::selection {\r\n\tbackground: transparent;\r\n}\r\n/* Safari renders non-retina tile on retina better with this, but Chrome is worse */\r\n.leaflet-safari .leaflet-tile {\r\n\timage-rendering: -webkit-optimize-contrast;\r\n\t}\r\n/* hack that prevents hw layers \"stretching\" when loading new tiles */\r\n.leaflet-safari .leaflet-tile-container {\r\n\twidth: 1600px;\r\n\theight: 1600px;\r\n\t-webkit-transform-origin: 0 0;\r\n\t}\r\n.leaflet-marker-icon,\r\n.leaflet-marker-shadow {\r\n\tdisplay: block;\r\n\t}\r\n/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */\r\n/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */\r\n.leaflet-container .leaflet-overlay-pane svg {\r\n\tmax-width: none !important;\r\n\tmax-height: none !important;\r\n\t}\r\n.leaflet-container .leaflet-marker-pane img,\r\n.leaflet-container .leaflet-shadow-pane img,\r\n.leaflet-container .leaflet-tile-pane img,\r\n.leaflet-container img.leaflet-image-layer,\r\n.leaflet-container .leaflet-tile {\r\n\tmax-width: none !important;\r\n\tmax-height: none !i u002Fdiv>\n\n      <div style=\"{{ mapColStyle }}\">\n        <div ref=\"{{ mapRef }}\" style=\"width:100%;height:100%;min-height:420px;border-radius:20px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-md);background:var(--surface-2)\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <footer style=\"border-top:1px solid var(--border);padding:22px 20px;text-align:center\">\n    <div style=\"max-width:1280px;margin:0 auto;font-size:12px;color:var(--text-muted);line-height:1.6\">Información recopilada con fines humanitarios. Verifica los datos con cada organización antes de acudir. · Actualizado junio 2026<\u002Fdiv>\n  <\u002Ffooter>\n\n  \n\n  <!-- Modal proponer -->\n  <div style=\"{{ modalStyle }}\" onclick=\"{{ closeModalBackdrop }}\">\n    <div onclick=\"{{ stop }}\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:26px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);position:relative\">\n      <button onclick=\"{{ closeModal }}\" aria-label=\"Cerrar\" style=\"position:absolute;top:16px;right:16px;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;border:none;background:var(--surface-2);color:var(--text-secondary);cursor:pointer\" style-hover=\"background:var(--surface-3)\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <h2 style=\"font-size:19px;font-weight:800;letter-spacing:-0.02em;margin:0 0 4px\">Proponer un centro<\u002Fh2>\n      <p style=\"font-size:13.5px;color:var(--text-secondary);margin:0 0 18px\">Tu propuesta será revisada antes de publicarse.<\u002Fp>\n\n      <sc-if value=\"{{ submitOk }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:26px 10px\">\n          <div style=\"width:54px;height:54px;border-radius:999px;background:var(--success-soft);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px\">\n            <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--success)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-weight:700;font-size:16px;margin-bottom:5px\">¡Gracias!<\u002Fdiv>\n          <div style=\"font-size:14px;color:var(--text-secondary);max-width:300px;margin:0 auto 18px\">Recibimos tu propuesta. El equipo la revisará pronto.<\u002Fdiv>\n          <button onclick=\"{{ closeModal }}\" style=\"height:44px;padding:0 22px;border-radius:13px;border:none;background:var(--accent);color:var(--text-onaccent);font:inherit;font-weight:600;font-size:14px;cursor:pointer\">Cerrar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ onSubmit }}\">\n          <datalist id=\"acopio-paises\"><sc-for list=\"{{ paisesDatalist }}\" as=\"p\" hint-placeholder-count=\"4\"><option value=\"{{ p }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist>\n          <div style=\"display:flex;flex-direction:column;gap:13px\">\n            <label style=\"display:block\">\n              <span style=\"display:block;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px\">País *<\u002Fspan>\n              <input name=\"pais\" list=\"acopio-paises\" defaultvalue=\"Venezuela\" required=\"\" placeholder=\"Venezuela\" style=\"width:100%;height:46px;padding:0 14px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:15px;outline:none\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring)\">\n            <\u002Flabel>\n            <label style=\"display:block\">\n              <span style=\"display:block;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px\">Nombre del centro *<\u002Fspan>\n              <input name=\"nombre\" required=\"\" placeholder=\"Ej: Cruz Roja de Bogotá\" style=\"width:100%;height:46px;padding:0 14px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:15px;outline:none\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring)\">\n            <\u002Flabel>\n            <label style=\"display:block\">\n              <span style=\"display:block;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px\">Ciudad *<\u002Fspan>\n              <input name=\"ciudad\" required=\"\" placeholder=\"Ej: Caracas\" style=\"width:100%;height:46px;padding:0 14px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:15px;outline:none\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring)\">\n            <\u002Flabel>\n            <label style=\"display:block\">\n              <span style=\"display:block;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px\">Dirección<\u002Fspan>\n              <input name=\"direccion\" placeholder=\"Ej: Av. Principal, frente a la plaza\" style=\"width:100%;height:46px;padding:0 14px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:15px;outline:none\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring)\">\n            <\u002Flabel>\n            <label style=\"display:block\">\n              <span style=\"display:block;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px\">¿Qué aceptan?<\u002Fspan>\n              <textarea name=\"acepta\" rows=\"2\" placeholder=\"Ej: Agua, alimentos no perecederos, medicinas…\" style=\"width:100%;padding:11px 14px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:15px;outline:none;resize:vertical;min-height:64px\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring)\"><\u002Ftextarea>\n            <\u002Flabel>\n            <label style=\"display:block\">\n              <span style=\"display:block;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px\">Contacto (teléfono, correo o red social)<\u002Fspan>\n              <input name=\"contacto\" placeholder=\"Ej: +58 412 123 4567\" style=\"width:100%;height:46px;padding:0 14px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:15px;outline:none\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring)\">\n            <\u002Flabel>\n            <sc-if value=\"{{ hasFormError }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:13px;color:var(--danger);background:var(--danger-soft);border-radius:10px;padding:9px 12px\">{{ formError }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <button type=\"submit\" style=\"{{ submitBtnStyle }}\">{{ submitLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fform>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const isDesktop = (typeof window !== 'undefined' ? window.innerWidth : 1200) >= 980;\n    this.state = {\n      centers: (typeof window !== 'undefined' && window.__CENTERS__) ? window.__CENTERS__ : [],\n      query: '', group: 'todos', country: '',\n      userLoc: null, locating: false,\n      isDesktop, view: 'lista', toolbarH: isDesktop ? 150 : 168,\n      modalOpen: false, submitting: false, submitOk: false, formError: '',\n    };\n    this._filtered = [];\n    this.markersById = {};\n  }\n\n  // ---- helpers ----\n  norm(s) { return (s || '').toString().normalize('NFD').replace(/[\\u0300-\\u036f]/g, '').toLowerCase(); }\n\n  haversine(a, b) {\n    const R = 6371, toR = Math.PI / 180;\n    const dLat = (b.lat - a.lat) * toR, dLng = (b.lng - a.lng) * toR;\n    const la1 = a.lat * toR, la2 = b.lat * toR;\n    const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;\n    return 2 * R * Math.asin(Math.sqrt(h));\n  }\n\n  parseAccept(s) {\n    if (!s) return [];\n    const pais = this.norm(s);\n    let parts = s.split(/[,;]+/).map(x => x.trim()).filter(Boolean);\n    const seen = new Set(); const out = [];\n    for (let p of parts) {\n      p = p.replace(/\\.+$/, '').trim();\n      if (p.length < 2) continue;\n      const key = this.norm(p);\n      if (seen.has(key)) continue;\n      seen.add(key);\n      if (p.length > 34) p = p.slice(0, 32).trim() + '…';\n      out.push(p.charAt(0).toUpperCase() + p.slice(1));\n    }\n    if (out.length > 8) {\n      const extra = out.length - 8;\n      return out.slice(0, 8).concat(['+' + extra + ' más']);\n    }\n    return out;\n  }\n\n  fmtContacto(contacto, web) {\n    const v = ((web || contacto) || '').toString().trim();\n    if (!v) return { text: '', href: '', link: false };\n    if (/^https?:\\/\\//i.test(v)) {\n      let label = 'Ver enlace';\n      if (/instagram\\.com/i.test(v)) label = 'Ver Instagram';\n      else if (/wa\\.me|whatsapp/i.test(v)) label = 'WhatsApp';\n      else if (/maps\\./i.test(v)) label = 'Ver en mapa';\n      return { text: label, href: v, link: true };\n    }\n    if (v.includes('@') && /\\S+@\\S+\\.\\S+/.test(v) && !/\\s/.test(v)) {\n      return { text: v, href: 'mailto:' + v, link: true };\n    }\n    const letters = (v.match(/[a-zA-ZáéíóúñÁÉÍÓÚÑ]/g) || []).length;\n    const digits = (v.match(/\\d/g) || []).length;\n    if (digits >= 7 && letters < 4) {\n      return { text: v, href: 'tel:' + v.replace(/[^\\d+]/g, ''), link: true };\n    }\n    return { text: v, href: '', link: false };\n  }\n\n  prep(c) {\n    const items = this.parseAccept(c.acepta);\n    const isVe = c.pais === 'Venezuela';\n    const lugar = [c.ciudad, isVe ? null : c.pais].filter(Boolean).join(' · ') || c.pais || '';\n    let distLabel = '';\n    const ul = this.state.userLoc;\n    if (ul && c.lat && c.lng) {\n      const d = this.haversine(ul, c);\n      distLabel = d < 1 ? Math.round(d * 1000) + ' m' : (d < 10 ? d.toFixed(1) : Math.round(d)) + ' km';\n    }\n    const mapsUrl = c.maps_link ? c.maps_link : (c.lat && c.lng ? 'https://maps.google.com/?q=' + c.lat + ',' + c.lng : '');\n    const ct = this.fmtContacto(c.contacto, c.web);\n    return {\n      id: c.id, nombre: c.nombre || 'Centro de acopio', lugar,\n      direccion: c.direccion || '', hasDir: !!c.direccion,\n      items, hasItems: items.length > 0,\n      horario: c.horario || '', hasHorario: !!c.horario,\n      contactoText: ct.text, contactoHref: ct.href,\n      linkContacto: !!ct.text && ct.link, textContacto: !!ct.text && !ct.link,\n      mapsUrl, hasMaps: !!mapsUrl,\n      distLabel, hasDist: !!distLabel,\n      lat: c.lat, lng: c.lng, pais: c.pais,\n    };\n  }\n\n  getFiltered() {\n    const { centers, group, country, userLoc } = this.state;\n    const q = this.norm(this.state.query);\n    let list = centers.filter(c => {\n      if (group === 'venezuela' && c.pais !== 'Venezuela') return false;\n      if (group === 'internacional') {\n        if (c.pais === 'Venezuela') return false;\n        if (country && c.pais !== country) return false;\n      }\n      if (q) {\n        const hay = this.norm([c.nombre, c.ciudad, c.direccion, c.pais].join(' '));\n        if (!hay.includes(q)) return false;\n      }\n      return true;\n    });\n    if (userLoc) {\n      list = list.slice().sort((a, b) => {\n        const da = (a.lat && a.lng) ? this.haversine(userLoc, a) : Infinity;\n        const db = (b.lat && b.lng) ? this.haversine(userLoc, b) : Infinity;\n        return da - db;\n      });\n    } else {\n      list = list.slice().sort((a, b) => {\n        const va = a.pais === 'Venezuela' ? 0 : 1, vb = b.pais === 'Venezuela' ? 0 : 1;\n        if (va !== vb) return va - vb;\n        return this.norm(a.ciudad).localeCompare(this.norm(b.ciudad));\n      });\n    }\n    return list;\n  }\n\n  // ---- lifecycle ----\n  componentDidMount() {\n    if (!this.state.centers.length && typeof window !== 'undefined' && window.__CENTERS__) {\n      this.setState({ centers: window.__CENTERS__ });\n    } else if (!this.state.centers.length) {\n      // embedded data script may not have run yet — poll briefly\n      let tries = 0;\n      this._dataTimer = setInterval(() => {\n        tries++;\n        if (window.__CENTERS__ && window.__CENTERS__.length) {\n          clearInterval(this._dataTimer);\n          this.setState({ centers: window.__CENTERS__ });\n        } else if (tries > 40) {\n          clearInterval(this._dataTimer);\n        }\n      }, 100);\n    }\n    // live data override if served by the backend\n    try {\n      fetch('/api/centers').then(r => r.ok ? r.json() : null).then(live => {\n        if (Array.isArray(live) && live.length) this.setState({ centers: live });\n      }).catch(() => {});\n    } catch (e) {}\n\n    this._measure();\n    window.addEventListener('resize', this._onResize = () => {\n      const isDesktop = window.innerWidth >= 980;\n      if (isDesktop !== this.state.isDesktop) this.setState({ isDesktop });\n      this._measure();\n      if (this.map) setTimeout(() => this.map.invalidateSize(), 60);\n    });\n    this._initMapWhenReady();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n    if (this._mapTimer) clearTimeout(this._mapTimer);\n    if (this._dataTimer) clearInterval(this._dataTimer);\n  }\n\n  componentDidUpdate(prevProps, prevState) {\n    if (this.map) {\n      this.syncMarkers(this._filtered);\n      if (this._fit) { this._applyFit(this._fit); this._fit = null; }\n      if (prevState.view !== this.state.view || prevState.isDesktop !== this.state.isDesktop) {\n        setTimeout(() => this.map && this.map.invalidateSize(), 70);\n      }\n    }\n  }\n\n  _measure() {\n    if (this.toolbarEl) {\n      const h = Math.round(this.toolbarEl.getBoundingClientRect().height);\n      if (h && h !== this.state.toolbarH) this.setState({ toolbarH: h });\n    }\n  }\n\n  _initMapWhenReady() {\n    const go = () => {\n      if (this.map) return;\n      if (window.L && window.L.markerClusterGroup && this.mapEl) { this._initMap(); }\n      else { this._mapTimer = setTimeout(go, 130); }\n    };\n    go();\n  }\n\n  _initMap() {\n    const L = window.L;\n    this.map = L.map(this.mapEl, { zoomControl: true, minZoom: 2, maxBounds: [[-90, -180], [90, 180]], maxBoundsViscosity: 1 });\n    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {\n      attribution: '© <a href=\"https://www.openstreetmap.org/copyright\">OpenStreetMap<\u002Fa> · © <a href=\"https://carto.com/attributions\">CARTO<\u002Fa>',\n      maxZoom: 19, subdomains: 'abcd', noWrap: true,\n    }).addTo(this.map);\n    this.cluster = L.markerClusterGroup({ showCoverageOnHover: false, maxClusterRadius: 55 });\n    this.map.addLayer(this.cluster);\n    this.map.setView([8.2, -66.5], 5);\n    this.markerSig = '';\n    this.syncMarkers(this._filtered.length ? this._filtered : this.getFiltered());\n    this._fit = 'results';\n    if (this._fit) { this._applyFit('results'); this._fit = null; }\n  }\n\n  _pinHtml(isVe) {\n    const color = isVe ? '#0A3D91' : '#CF8B00';\n    return '<span style=\"display:block;width:22px;height:22px;border-radius:999px;background:' + color + ';border:3px solid #fff;box-shadow:0 1px 5px rgba(10,20,40,.45)\"><\u002Fspan>';\n  }\n\n  _popupHtml(c) {\n    const v = this.prep(c);\n    let h = '<div style=\"min-width:180px;max-width:240px\">';\n    h += '<div style=\"font-weight:700;font-size:14px;line-height:1.3;color:#0D1320\">' + this._esc(v.nombre) + '<\u002Fdiv>';\n    h += '<div style=\"font-size:12px;color:#56607A;margin-top:3px\">' + this._esc(v.lugar) + '<\u002Fdiv>';\n    if (v.direccion) h += '<div style=\"font-size:12px;color:#56607A;margin-top:4px\">' + this._esc(v.direccion) + '<\u002Fdiv>';\n    if (v.mapsUrl) h += '<a href=\"' + v.mapsUrl + '\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;margin-top:9px;padding:6px 12px;border-radius:10px;background:#0A3D91;color:#fff;font-size:12px;font-weight:600;text-decoration:none\">Cómo llegar<\u002Fa>';\n    h += '<\u002Fdiv>';\n    return h;\n  }\n\n  _esc(s) { return (s || '').toString().replace(/[&<>\"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;' }[m])); }\n\n  syncMarkers(list) {\n    if (!this.cluster || !window.L) return;\n    const L = window.L;\n    const sig = list.map(c => c.id).join(',') + '|' + (this.state.userLoc ? 'u' : '');\n    if (sig === this.markerSig) return;\n    this.markerSig = sig;\n    this.cluster.clearLayers();\n    this.markersById = {};\n    list.forEach(c => {\n      if (!c.lat || !c.lng) return;\n      const m = L.marker([c.lat, c.lng], { icon: L.divIcon({ className: '', iconSize: [22, 22], iconAnchor: [11, 11], html: this._pinHtml(c.pais === 'Venezuela') }) });\n      m.bindPopup(this._popupHtml(c), { maxWidth: 250 });\n      this.cluster.addLayer(m);\n      this.markersById[c.id] = m;\n    });\n    const ul = this.state.userLoc;\n    if (ul) {\n      if (this.userMarker) this.map.removeLayer(this.userMarker);\n      this.userMarker = L.marker([ul.lat, ul.lng], { icon: L.divIcon({ className: '', iconSize: [18, 18], iconAnchor: [9, 9], html: '<span class=\"acopio-userdot\" style=\"display:block;width:18px;height:18px;border-radius:999px;background:#0A3D91;border:3px solid #fff\"><\u002Fspan>' }) }).addTo(this.map);\n    }\n  }\n\n  _applyFit(type) {\n    if (!this.map || !window.L) return;\n    if (type === 'user' && this.state.userLoc) {\n      this.map.setView([this.state.userLoc.lat, this.state.userLoc.lng], 12);\n      return;\n    }\n    const pts = this._filtered.filter(c => c.lat && c.lng).map(c => [c.lat, c.lng]);\n    if (pts.length) this.map.fitBounds(pts, { padding: [50, 50], maxZoom: 13 });\n  }\n\n  // ---- handlers ----\n  renderVals() {\n    const st = this.state;\n    const raw = this.getFiltered();\n    this._filtered = raw;\n    const filtered = raw.map(c => this.prep(c));\n    const n = raw.length;\n    const ctx = st.userLoc ? ' cerca de ti' : '';\n    const countLabel = n + (n === 1 ? ' centro' : ' centros') + ctx;\n\n    const countriesOptions = [...new Set(st.centers.filter(c => c.pais && c.pais !== 'Venezuela').map(c => c.pais))].sort((a, b) => a.localeCompare(b));\n    const paisesDatalist = ['Venezuela', ...countriesOptions, 'Otro'];\n\n    const tab = (active) => ({\n      display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '7px 15px',\n      borderRadius: '999px', border: 'none', font: 'inherit', fontWeight: 600, fontSize: '13px',\n      cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all var(--dur) var(--ease-out)',\n      background: active ? 'var(--accent)' : 'transparent',\n      color: active ? 'var(--text-onaccent)' : 'var(--text-secondary)',\n      boxShadow: active ? 'var(--shadow-glow)' : 'none',\n    });\n\n    const isD = st.isDesktop;\n    const th = st.toolbarH || (isD ? 150 : 168);\n\n    const gridStyle = isD\n      ? { display: 'grid', gridTemplateColumns: 'minmax(340px,1fr) minmax(420px,1.12fr)', gap: '20px', alignItems: 'start' }\n      : { display: 'block' };\n\n    const listColStyle = (!isD && st.view === 'mapa') ? { display: 'none' } : { minWidth: 0 };\n\n    const mapColStyle = isD\n      ? { position: 'sticky', top: th + 'px', height: 'calc(100vh - ' + (th + 28) + 'px)', minHeight: '480px' }\n      : (st.view === 'lista' ? { display: 'none' } : { height: 'calc(100vh - ' + (th + 90) + 'px)', minHeight: '420px' });\n\n    const submitBtnStyle = {\n      width: '100%', height: '48px', marginTop: '4px', borderRadius: '14px', border: 'none',\n      background: st.submitting ? 'var(--text-muted)' : 'var(--accent)', color: 'var(--text-onaccent)',\n      font: 'inherit', fontWeight: 700, fontSize: '15px', cursor: st.submitting ? 'default' : 'pointer',\n    };\n\n    return {\n      filtered, noResults: n === 0 && st.centers.length > 0,\n      countLabel, countriesOptions, paisesDatalist,\n      showCountry: st.group === 'internacional',\n      gridStyle, listColStyle, mapColStyle,\n      styTabTodos: tab(st.group === 'todos'),\n      styTabVe: tab(st.group === 'venezuela'),\n      styTabIntl: tab(st.group === 'internacional'),\n      isDesktop: isD, view: st.view, showViewToggle: !isD,\n      styViewLista: tab(st.view === 'lista'),\n      styViewMapa: tab(st.view === 'mapa'),\n      locateLabel: st.locating ? 'Buscando…' : (st.userLoc ? 'Cerca de ti' : 'Cerca de mí'),\n\n      modalStyle: {\n        display: st.modalOpen ? 'flex' : 'none', position: 'fixed', inset: 0, zIndex: 100,\n        alignItems: 'center', justifyContent: 'center', padding: '16px',\n        background: 'var(--overlay)', backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)',\n      },\n      submitOk: st.submitOk, showForm: !st.submitOk,\n      hasFormError: !!st.formError, formError: st.formError,\n      submitLabel: st.submitting ? 'Enviando…' : 'Enviar propuesta', submitBtnStyle,\n\n      // refs\n      toolbarRef: (el) => { this.toolbarEl = el; },\n      mapRef: (el) => { this.mapEl = el; },\n      searchRef: (el) => { this.searchEl = el; },\n\n      // handlers\n      onSearch: (e) => this.setState({ query: e.target.value }),\n      setGroup: (e) => { this._fit = 'results'; this.setState({ group: e.currentTarget.dataset.group, country: '' }); },\n      onCountry: (e) => { this._fit = 'results'; this.setState({ country: e.target.value }); },\n      setView: (e) => this.setState({ view: e.currentTarget.dataset.view }),\n      clearFilters: () => { if (this.searchEl) this.searchEl.value = ''; this._fit = 'results'; this.setState({ query: '', group: 'todos', country: '' }); },\n      stop: (e) => e.stopPropagation(),\n      focusCard: (e) => {\n        const id = e.currentTarget.dataset.id;\n        const m = this.markersById[id];\n        if (m && this.cluster && this.cluster.zoomToShowLayer) this.cluster.zoomToShowLayer(m, () => m.openPopup());\n        else if (m) { this.map.setView(m.getLatLng(), 14); m.openPopup(); }\n        if (!this.state.isDesktop && m) this.setState({ view: 'mapa' });\n      },\n      locate: () => {\n        if (!navigator.geolocation) { this.setState({ formError: '' }); return; }\n        this.setState({ locating: true });\n        navigator.geolocation.getCurrentPosition(\n          (pos) => { this._fit = 'user'; this.setState({ userLoc: { lat: pos.coords.latitude, lng: pos.coords.longitude }, locating: false, view: this.state.isDesktop ? this.state.view : 'mapa' }); },\n          () => { this.setState({ locating: false }); },\n          { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }\n        );\n      },\n      openModal: () => this.setState({ modalOpen: true, submitOk: false, formError: '' }),\n      closeModal: () => this.setState({ modalOpen: false }),\n      closeModalBackdrop: (e) => { if (e.target === e.currentTarget) this.setState({ modalOpen: false }); },\n      onSubmit: (e) => {\n        e.preventDefault();\n        const f = e.target;\n        const data = Object.fromEntries(new FormData(f));\n        if (!data.pais || !data.nombre || !data.ciudad) { this.setState({ formError: 'Completa país, nombre y ciudad.' }); return; }\n        this.setState({ submitting: true, formError: '' });\n        const done = () => this.setState({ submitting: false, submitOk: true });\n        try {\n          fetch('/api/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })\n            .then(r => r.json()).then(j => { if (j && j.ok) done(); else this.setState({ submitting: false, formError: (j && j.error) || 'No se pudo enviar.' }); })\n            .catch(() => done());\n        } catch (err) { done(); }\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
